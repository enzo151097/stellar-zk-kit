# Stellar ZK Kit config — proof-of-funds example.
# Prove a private balance is >= a public `min` threshold without revealing
# the balance. This is the canonical "real-world money movement" ZK use case:
# a user can prove solvency to a counterparty on Stellar without exposing their
# full holdings.
#
# Run:  zkkit build --config examples/proof_of_funds/zkkit.toml

[circuit]
name = "proof_of_funds"
backend = "ultrahonk"
source = "src/main.nr"

[public_inputs]
# Declared order MUST match the circuit's public parameter order.
# Here: only `min` is public; `balance` is private.
order = ["min"]
min = { type = "u64" }
